# BiLSTM + CNN Aspect Detection Configuration
# ========================================================================
# Single Task Learning: Aspect Detection Only
#
# Task: Binary multi-label classification (11 aspects)
# Model: BiLSTM + Conv1D + GlobalPooling (NO pretrained embeddings)
# Embeddings: Trainable embeddings (random initialization)
# Architecture: Embedding → SpatialDropout → BiLSTM → Conv1D → Pooling → Dense
# ========================================================================

paths:
  data_dir: "data"
  train_file: "data/train_multilabel.csv"
  validation_file: "data/validation_multilabel.csv"
  test_file: "data/test_multilabel.csv"
  output_dir: "models/bilstm_aspect_detection"
  evaluation_report: "results/evaluation_report_bilstm_ad.txt"
  predictions_file: "results/test_predictions_bilstm_ad.csv"

model:
  # Tokenizer
  tokenizer_name: "vinai/phobert-base-v2"

  # Pretrained PhoBERT embeddings
  use_phobert_embeddings: true
  freeze_embeddings: true

  # Attention mechanism
  use_attention: true
  attention_heads: 8
  attention_dropout: 0.1

  # Architecture
  vocab_size: 64000
  embedding_dim: 768
  padding_idx: 1

  # BiLSTM architecture
  lstm_hidden_size: 256 # Hidden size of BiLSTM
  lstm_num_layers: 2 # Number of BiLSTM layers
  lstm_dropout: 0.3 # Dropout for BiLSTM (only if num_layers > 1)

  # Spatial Dropout
  spatial_dropout: 0.2 # Spatial dropout rate for embeddings

  # Conv1D layer
  conv_filters: 128 # Number of Conv1D filters
  conv_kernel_size: 3 # Kernel size for Conv1D

  # Dense layers
  dense_hidden_size: 256 # Hidden size of dense layer
  dense_dropout: 0.3 # Dropout for dense layer

  # Task settings
  num_aspects: 11
  max_length: 256

  # Detection threshold
  threshold: 0.5 # Threshold for binary classification

valid_aspects:
  - Battery
  - Camera
  - Performance
  - Display
  - Design
  - Packaging
  - Price
  - Shop_Service
  - Shipping
  - General
  - Others

training:
  # Batch sizes
  per_device_train_batch_size: 32
  per_device_eval_batch_size: 64
  gradient_accumulation_steps: 2 # Effective batch = 64

  # Optimizer settings
  learning_rate: 1.0e-3 # Optimized LR
  weight_decay: 0.01
  max_grad_norm: 1.0

  # Learning rate scheduler
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1

  # Training duration
  num_train_epochs: 40

  # Mixed precision (Tesla T4 x2)
  fp16: true

  # DataLoader settings
  dataloader_num_workers: 2
  dataloader_pin_memory: true

  # Evaluation & checkpointing
  evaluation_strategy: "epoch"
  save_strategy: "epoch"
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_f1_macro"
  greater_is_better: true

  # Early stopping
  early_stopping_patience: 10
  early_stopping_threshold: 0.001

  # Logging
  logging_strategy: "steps"
  logging_steps: 50
  logging_first_step: true

  # Device
  device: "cuda" # or "cpu"

# Loss function settings
loss:
  use_focal_loss: true
  focal_gamma: 2.0
  use_pos_weight: true # Use pos_weight for class imbalance
  pos_weight_auto: true # Auto-calculate pos_weight from data

# Reproducibility
reproducibility:
  seed: 42
  data_split_seed: 42
  dataloader_seed: 42
  deterministic: true

general:
  log_level: "info"
  save_predictions: true
  save_attention_weights: false # Set to true to save attention weights
